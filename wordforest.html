<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素勇者：文字森林</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
    
    /* 全局字體設定為標楷體，方便學生辨識筆畫 */
    body { 
      font-family: 'BiauKai', 'DFKai-SB', serif; 
      background: radial-gradient(circle at center, #2e4f35 0%, #0f2416 100%);
      touch-action: manipulation; 
    }
    
    /* 卷軸/牛皮紙 共用樣式 */
    .kraft-paper {
      background-color: #eaddb5;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      border: 6px solid #6d4c41;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      color: #3e2723;
    }

    /* 木頭按鈕 共用樣式 */
    .wood-btn {
      background-color: #8b5a2b;
      border: 4px solid #5c3a21;
      box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3), inset 4px 4px 0px rgba(255,255,255,0.1);
      color: #fff;
      text-shadow: 2px 2px 0px #3e2723;
    }
    .wood-btn:hover {
      background-color: #a0522d;
    }
    .wood-btn:active {
      box-shadow: inset 4px 4px 0px rgba(0,0,0,0.4);
      transform: translateY(2px);
    }

    /* 答錯時的震動特效 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-8px); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out; }

    /* 答對時的發光特效 (調整為配合牛皮紙的綠色調) */
    @keyframes glow {
      0% { box-shadow: 0 0 5px #228b22; transform: scale(1); }
      50% { box-shadow: 0 0 20px #228b22; transform: scale(1.05); }
      100% { box-shadow: 0 0 5px #228b22; transform: scale(1); }
    }
    .animate-glow { animation: glow 0.8s ease-in-out forwards; }

    /* 怪物待機浮動特效 */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }

    /* 選單按鈕的選取狀態 */
    .btn-selected {
      background-color: #2e8b57 !important; /* 森林綠 */
      border-color: #004d00 !important;
      color: white !important;
      transform: translateY(4px);
      border-bottom-width: 0px !important;
      box-shadow: 0 0 10px rgba(46, 139, 87, 0.6);
    }
    
    /* 載入動畫 */
    .loader {
      border: 4px solid #d4b886;
      border-top: 4px solid #8b5a2b;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 新增：像素字體特效與容器升級 */
    .font-pixel { font-family: 'DotGothic16', sans-serif; }
    .text-pixel-shadow { text-shadow: 3px 3px 0px #2e4f35, 6px 6px 0px rgba(0,0,0,0.5); }
    .rpg-title-box { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 12px; border: 3px dashed #8b5a2b; }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen select-none p-4 sm:p-6 md:p-8">

  <!-- 隱藏的開源背景音樂 (CC-BY 授權) -->
  <audio id="bgm-player" loop preload="auto" src="https://opengameart.org/sites/default/files/Rolemusic_-_pl4y1ng.mp3"></audio>

  <!-- 右上角控制列 (音效、回首頁) -->
  <div class="fixed top-3 right-3 sm:top-5 sm:right-5 flex gap-2 sm:gap-3 z-50">
    <button onclick="toggleSound()" id="sound-btn" class="wood-btn p-2 sm:p-3 rounded-lg active:translate-y-1 active:border-b-0 transition-all shadow-lg text-xl sm:text-2xl flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14" title="音效開關">
      🔊
    </button>
    <button onclick="showGlobalLeaderboard()" class="wood-btn p-2 sm:p-3 rounded-lg active:translate-y-1 active:border-b-0 transition-all shadow-lg text-xl sm:text-2xl flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14" title="排行榜">
      🏆
    </button>
    <button onclick="promptGoHome()" class="wood-btn p-2 sm:p-3 rounded-lg active:translate-y-1 active:border-b-0 transition-all shadow-lg text-xl sm:text-2xl flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14" title="回首頁">
      🏠
    </button>
  </div>

  <!-- 開始畫面 (參數選擇選單) -->
  <div id="start-screen" class="w-full max-w-md kraft-paper p-6 sm:p-8 flex flex-col items-center justify-center transition-all duration-300 mt-8 sm:mt-0 relative overflow-hidden">
    <!-- 卷軸裝飾棒 -->
    <div class="absolute top-0 left-0 w-full h-3 bg-[#5c4033] rounded-t"></div>
    <div class="absolute bottom-0 left-0 w-full h-3 bg-[#5c4033] rounded-b"></div>
    
    <div class="rpg-title-box w-full mb-6 mt-2 flex flex-col items-center">
      <h1 class="text-5xl sm:text-6xl font-bold mb-3 text-[#f6e05e] text-center font-pixel text-pixel-shadow tracking-widest leading-tight">文字森林</h1>
      <h2 class="text-2xl sm:text-3xl font-bold text-[#fdf5e6] text-center font-pixel tracking-widest drop-shadow-lg">勇者來挑戰</h2>
    </div>
    
    <!-- 參數選擇 (雙欄位：難度與題數) -->
    <div class="grid grid-cols-2 gap-4 w-full mb-8">
      <!-- 難度選擇 -->
      <div class="flex flex-col items-center">
        <p class="text-[#5c4033] mb-2 text-center text-sm sm:text-base font-bold tracking-wider">🗡️ 難度</p>
        <select id="difficulty-select" class="w-full bg-[#fdf5e6] border-2 border-[#8b5a2b] text-[#3e2723] text-lg sm:text-xl py-3 px-2 rounded outline-none focus:border-[#004d00] transition-all font-bold cursor-pointer appearance-none text-center shadow-inner" style="background-image: url('data:image/svg+xml;utf8,<svg fill=%22%238b5a2b%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-position: right 8px center; background-repeat: no-repeat;">
          <option value="easy">🌿 初 級</option>
          <option value="medium">🌲 中 級</option>
          <option value="hard">🌋 高 級</option>
        </select>
      </div>

      <!-- 題數選擇 -->
      <div class="flex flex-col items-center">
        <p class="text-[#5c4033] mb-2 text-center text-sm sm:text-base font-bold tracking-wider">📜 挑戰數量</p>
        <select id="count-select" class="w-full bg-[#fdf5e6] border-2 border-[#8b5a2b] text-[#3e2723] text-lg sm:text-xl py-3 px-2 rounded outline-none focus:border-[#004d00] transition-all font-bold cursor-pointer appearance-none text-center shadow-inner" style="background-image: url('data:image/svg+xml;utf8,<svg fill=%22%238b5a2b%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-position: right 8px center; background-repeat: no-repeat;">
          <option value="5">5 題</option>
          <option value="10">10 題</option>
          <option value="15">15 題</option>
        </select>
      </div>
    </div>
    
    <button onclick="startGame()" class="bg-[#228b22] hover:bg-[#006400] border-4 border-b-8 border-[#004d00] text-white text-2xl sm:text-3xl py-3 rounded-lg active:translate-y-1 active:border-b-4 transition-all w-full font-bold tracking-widest shadow-xl mb-2 font-pixel">
      開始冒險
    </button>
  </div>

  <!-- 全域排行榜視窗 (預設隱藏) -->
  <div id="global-leaderboard-modal" class="fixed inset-0 bg-[#0f2416]/90 z-[70] flex flex-col items-center justify-center hidden p-4 sm:p-6 transition-all">
    <div class="w-full max-w-sm kraft-paper !border-4 !shadow-2xl p-6 relative overflow-hidden">
      <!-- 卷軸裝飾棒 -->
      <div class="absolute top-0 left-0 w-full h-3 bg-[#5c4033] rounded-t"></div>
      <div class="absolute bottom-0 left-0 w-full h-3 bg-[#5c4033] rounded-b"></div>
      
      <h3 class="text-[#8b5a2b] font-bold text-center mb-4 mt-2 text-2xl border-b-2 border-[#8b5a2b] pb-2 font-pixel tracking-wider">👑 英雄排行榜</h3>
      
      <!-- 排行榜篩選器 -->
      <div class="flex gap-2 mb-4 justify-center">
        <select id="global-lb-diff" onchange="fetchLeaderboard(false, 'global-leaderboard-list', this.value, document.getElementById('global-lb-cnt').value)" class="bg-[#fdf5e6] border-2 border-[#8b5a2b] text-[#3e2723] px-2 py-1 rounded outline-none font-bold text-sm shadow-inner cursor-pointer">
          <option value="初級">🌿 初級</option>
          <option value="中級">🌲 中級</option>
          <option value="高級">🌋 高級</option>
        </select>
        <select id="global-lb-cnt" onchange="fetchLeaderboard(false, 'global-leaderboard-list', document.getElementById('global-lb-diff').value, this.value)" class="bg-[#fdf5e6] border-2 border-[#8b5a2b] text-[#3e2723] px-2 py-1 rounded outline-none font-bold text-sm shadow-inner cursor-pointer">
          <option value="5">5 題</option>
          <option value="10">10 題</option>
          <option value="15">15 題</option>
        </select>
      </div>

      <div id="global-leaderboard-list" class="space-y-2 text-sm sm:text-base mb-6 max-h-[50vh] overflow-y-auto pr-2">
        <!-- 動態生成排名 -->
        <div class="text-center text-[#8b5a2b] py-4"><span class="loader"></span> 載入中...</div>
      </div>

      <button onclick="closeGlobalLeaderboard()" class="wood-btn text-lg sm:text-xl py-2 px-8 rounded active:translate-y-1 active:border-b-0 transition-all font-bold tracking-wider w-full mb-1 font-pixel">
        關閉
      </button>
    </div>
  </div>

  <!-- 遊戲主畫面容器 (預設隱藏) -->
  <div id="game-container" class="w-full max-w-md kraft-paper p-4 sm:p-5 relative overflow-hidden hidden transition-all duration-300 mt-8 sm:mt-0">
    <!-- 卷軸裝飾棒 -->
    <div class="absolute top-0 left-0 w-full h-3 bg-[#5c4033] rounded-t"></div>
    <div class="absolute bottom-0 left-0 w-full h-3 bg-[#5c4033] rounded-b"></div>

    <!-- 遊戲結束/通關 遮罩層 (加入計時與排行榜) -->
    <div id="overlay" class="absolute inset-0 bg-[#0f2416]/90 z-50 flex flex-col items-center justify-start hidden p-4 sm:p-6 overflow-y-auto mt-3 mb-3">
      <div class="w-full max-w-sm mt-2 sm:mt-4 flex flex-col items-center">
        <h2 id="overlay-title" class="text-3xl sm:text-4xl font-bold mb-2 text-[#fdf5e6] text-center"></h2>
        <p id="overlay-desc" class="text-lg sm:text-xl mb-4 text-[#eaddb5] text-center whitespace-pre-line"></p>
        
        <!-- 排行榜表單區域 -->
        <div id="leaderboard-form" class="w-full kraft-paper !border-4 !shadow-md p-4 mb-4 hidden">
          <p class="text-[#004d00] font-bold mb-3 text-center tracking-wider text-lg">🏆 登錄排行榜</p>
          <input type="text" id="player-name" placeholder="輸入你的大名..." maxlength="10" class="w-full bg-[#fdf5e6] border-2 border-[#8b5a2b] text-[#3e2723] px-3 py-3 rounded mb-3 text-center focus:outline-none focus:border-[#004d00] text-lg font-bold">
          <button id="submit-score-btn" onclick="submitScore()" class="w-full bg-[#228b22] hover:bg-[#006400] border-4 border-b-8 border-[#004d00] text-white font-bold py-3 rounded-lg active:translate-y-1 active:border-b-4 transition-all flex justify-center items-center gap-2 text-xl font-pixel">
            送出成績
          </button>
        </div>

        <!-- 排行榜顯示區域 -->
        <div id="leaderboard-display" class="w-full kraft-paper !border-4 !shadow-md p-4 mb-6 hidden">
          <h3 class="text-[#8b5a2b] font-bold text-center mb-1 text-xl border-b-2 border-[#8b5a2b] pb-2 font-pixel tracking-wider">👑 英雄榜 (Top 10)</h3>
          <p id="current-mode-label" class="text-center text-[#5c4033] text-xs mb-3 font-bold"></p>
          <div id="leaderboard-list" class="space-y-2 text-sm sm:text-base">
            <!-- 動態生成排名 -->
            <div class="text-center text-[#8b5a2b] py-4"><span class="loader"></span> 載入中...</div>
          </div>
        </div>

        <button onclick="goToHome()" class="wood-btn text-lg sm:text-xl py-3 px-8 rounded active:translate-y-1 active:border-b-0 transition-all font-bold tracking-wider mt-auto w-full">
          回村莊 (首頁)
        </button>
      </div>
    </div>

    <!-- 防呆確認視窗 (回首頁) -->
    <div id="confirm-modal-overlay" class="absolute inset-0 bg-[#0f2416]/90 z-[60] flex flex-col items-center justify-center hidden p-4 transition-all mt-3 mb-3">
      <div class="kraft-paper !border-4 p-6 w-full max-w-[90%] shadow-2xl">
        <h2 class="text-2xl font-bold mb-3 text-[#8b5a2b] text-center">確定回村莊？</h2>
        <p class="text-base mb-6 text-[#5c4033] text-center font-bold">目前的探險進度將會遺失喔！</p>
        <div class="flex gap-3 justify-center">
          <button onclick="cancelGoHome()" class="wood-btn text-lg py-2 px-6 rounded active:translate-y-1 active:border-b-0 transition-all font-bold w-1/2">
            取消
          </button>
          <button onclick="goToHome()" class="bg-red-700 hover:bg-red-800 border-b-4 border-red-900 text-white text-lg py-2 px-6 rounded active:translate-y-1 active:border-b-0 transition-all font-bold w-1/2">
            確定
          </button>
        </div>
      </div>
    </div>

    <!-- 頂部資訊列：關卡、血條與經驗值 -->
    <div class="flex justify-between items-end mb-3 mt-4">
      <div class="w-1/2">
        <div class="flex justify-between text-xs sm:text-sm mb-1">
          <span class="text-red-700 font-bold">HP</span>
          <span id="hp-text" class="text-[#5c4033] font-bold">5/5</span>
        </div>
        <div class="w-full bg-[#d4b886] h-3 sm:h-4 rounded border-2 border-[#8b5a2b] overflow-hidden">
          <div id="hp-bar" class="bg-[#228b22] h-full w-full transition-all duration-300"></div>
        </div>
      </div>
      <div class="text-right">
        <p class="text-[#5c4033] font-bold text-xs sm:text-sm mb-1 flex justify-end gap-3" id="level-indicator">
          <span>關卡: 1/5</span>
        </p>
        <p class="text-[#8b5a2b] font-bold text-base sm:text-lg flex justify-end items-center gap-2">
          <span class="text-[#2e8b57] font-mono text-sm sm:text-base bg-[#fdf5e6] px-1 rounded border border-[#8b5a2b]">⏱️ <span id="timer-text">00:00</span></span>
          <span>EXP: <span id="exp-score">0</span></span>
        </p>
      </div>
    </div>

    <!-- 戰鬥視窗 -->
    <div class="bg-[#fdf5e6] border-2 border-[#8b5a2b] h-56 sm:h-64 flex flex-col items-center justify-center mb-4 sm:mb-5 relative rounded p-2 shadow-inner">
      
      <!-- 語詞情境區 (如: 國 [?]) -->
      <div id="word-context-container" class="flex items-center justify-center gap-2 mb-4 w-full">
        <!-- 由 JS 動態生成 -->
      </div>
      
      <!-- 怪物本體 (挖空的部首) -->
      <div id="monster-char" class="text-4xl sm:text-5xl font-bold bg-[#e8d5a6] px-6 py-4 rounded border-2 border-dashed border-[#8b5a2b] animate-float transition-all duration-300 text-center whitespace-nowrap shadow-md text-[#3e2723]">
        <!-- 由 JS 動態生成 -->
      </div>
    </div>

    <!-- 技能選單：部首選項 -->
    <div id="options-container" class="grid grid-cols-3 gap-2 sm:gap-3 mb-2">
      <!-- 按鈕由 JS 動態生成 -->
    </div>

  </div>

  <script>
    // --- 遊戲音效與 BGM 系統 ---
    let audioCtx;
    let isSoundEnabled = true;
    const bgmPlayer = document.getElementById('bgm-player');

    function playSound(type) {
      if (!isSoundEnabled) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      const now = audioCtx.currentTime;

      if (type === 'click') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(450, now);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'correct') {
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(523.25, now); 
        osc.frequency.setValueAtTime(659.25, now + 0.1); 
        gainNode.gain.setValueAtTime(0.15, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      }
    }

    function toggleSound() {
      isSoundEnabled = !isSoundEnabled;
      document.getElementById('sound-btn').innerText = isSoundEnabled ? '🔊' : '🔇';
      playSound('click');
      
      // 控制背景音樂
      if (isSoundEnabled && !document.getElementById('game-container').classList.contains('hidden')) {
        bgmPlayer.play().catch(e => console.log(e));
      } else {
        bgmPlayer.pause();
      }
    }

    // --- 全域排行榜邏輯 ---
    function showGlobalLeaderboard() {
      playSound('click');
      document.getElementById('global-leaderboard-modal').classList.remove('hidden');
      const diff = document.getElementById('global-lb-diff').value;
      const cnt = document.getElementById('global-lb-cnt').value;
      fetchLeaderboard(false, 'global-leaderboard-list', diff, cnt);
    }

    function closeGlobalLeaderboard() {
      playSound('click');
      document.getElementById('global-leaderboard-modal').classList.add('hidden');
    }

    // --- 頁面切換與防呆邏輯 ---
    function promptGoHome() {
      playSound('click');
      const gameContainer = document.getElementById('game-container');
      const isGameOverOverlayVisible = !document.getElementById('overlay').classList.contains('hidden');
      
      if (!gameContainer.classList.contains('hidden') && !isGameOverOverlayVisible) {
        document.getElementById('confirm-modal-overlay').classList.remove('hidden');
      } else {
        goToHome();
      }
    }

    function cancelGoHome() {
      playSound('click');
      document.getElementById('confirm-modal-overlay').classList.add('hidden');
    }

    function goToHome() {
      playSound('click');
      bgmPlayer.pause();
      bgmPlayer.currentTime = 0; // 音樂回到開頭
      document.getElementById('confirm-modal-overlay').classList.add('hidden');
      document.getElementById('game-container').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
      document.getElementById('overlay').classList.add('hidden');
    }

    // --- 完整題庫資料庫 ---
    // 格式：context 陣列中的 '？' 代表要填空的字
    const questionBanks = {
      easy: [
        { context: ['國', '？'], target: '語', radical: '言', component: '吾', options: ['氵', '言', '木'] },
        { context: ['？', '息'], target: '休', radical: '亻', component: '木', options: ['亻', '彳', '口'] },
        { context: ['賽', '？'], target: '跑', radical: '足', component: '包', options: ['走', '辵', '足'] },
        { context: ['？', '球'], target: '拍', radical: '扌', component: '白', options: ['扌', '才', '寸'] },
        { context: ['？', '水'], target: '喝', radical: '口', component: '曷', options: ['日', '口', '目'] },
        { context: ['大', '？'], target: '樹', radical: '木', component: '尌', options: ['木', '禾', '竹'] },
        { context: ['吃', '？'], target: '飯', radical: '食', component: '反', options: ['口', '食', '欠'] },
        { context: ['小', '？'], target: '貓', radical: '豸', component: '苗', options: ['犭', '豸', '虫'] },
        { context: ['？', '覺'], target: '睡', radical: '目', component: '垂', options: ['日', '目', '月'] },
        { context: ['洗', '？'], target: '澡', radical: '氵', component: '喿', options: ['氵', '水', '火'] },
        { context: ['唱', '？'], target: '歌', radical: '欠', component: '哥', options: ['口', '欠', '音'] },
        { context: ['閱', '？'], target: '讀', radical: '言', component: '賣', options: ['言', '曰', '日'] },
        { context: ['？', '舞'], target: '跳', radical: '足', component: '兆', options: ['足', '走', '手'] },
        { context: ['玩', '？'], target: '耍', radical: '而', component: '女', options: ['而', '女', '子'] },
        { context: ['花', '？'], target: '草', radical: '艸', component: '早', options: ['艸', '木', '竹'] }
      ],
      medium: [
        { context: ['躲', '？'], target: '藏', radical: '艸', component: '臧', options: ['艸', '广', '厂'] },
        { context: ['服', '？'], target: '裝', radical: '衣', component: '壯', options: ['衣', '巾', '士'] },
        { context: ['？', '子'], target: '影', radical: '彡', component: '景', options: ['彡', '日', '京'] },
        { context: ['音', '？'], target: '響', radical: '音', component: '鄉', options: ['口', '耳', '音'] },
        { context: ['？', '圈'], target: '圓', radical: '囗', component: '員', options: ['口', '囗', '貝'] },
        { context: ['慢', '？'], target: '慢', radical: '心', component: '曼', options: ['心', '忄', '水'] },
        { context: ['？', '子'], target: '鏡', radical: '金', component: '竟', options: ['金', '玉', '石'] },
        { context: ['木', '？'], target: '橋', radical: '木', component: '喬', options: ['木', '土', '石'] },
        { context: ['時', '？'], target: '鐘', radical: '金', component: '童', options: ['金', '音', '日'] },
        { context: ['安', '？'], target: '靜', radical: '青', component: '爭', options: ['青', '月', '爭'] },
        { context: ['？', '巴'], target: '嘴', radical: '口', component: '觜', options: ['口', '角', '肉'] },
        { context: ['？', '頰'], target: '臉', radical: '肉', component: '僉', options: ['肉', '月', '面'] },
        { context: ['頭', '？'], target: '髮', radical: '髟', component: '拔', options: ['髟', '長', '毛'] },
        { context: ['？', '印'], target: '腳', radical: '肉', component: '卻', options: ['肉', '月', '足'] },
        { context: ['？', '浮'], target: '漂', radical: '氵', component: '票', options: ['口', '氵', '扌'] }
      ],
      hard: [
        { context: ['煩', '？'], target: '悶', radical: '心', component: '門', options: ['門', '心', '日'] },
        { context: ['？', '贏'], target: '輸', radical: '車', component: '俞', options: ['貝', '車', '女'] },
        { context: ['？', '彎'], target: '轉', radical: '車', component: '專', options: ['車', '日', '辶'] },
        { context: ['？', '生'], target: '醫', radical: '酉', component: '殹', options: ['酉', '匚', '矢'] },
        { context: ['雜', '？'], target: '誌', radical: '言', component: '志', options: ['言', '心', '士'] },
        { context: ['豐', '？'], target: '富', radical: '宀', component: '畐', options: ['宀', '口', '田'] },
        { context: ['領', '？'], target: '導', radical: '道', component: '寸', options: ['道', '口', '寸'] },
        { context: ['顏', '？'], target: '色', radical: '色', component: '刀', options: ['色', '刀', '巴'] },
        { context: ['願', '？'], target: '意', radical: '心', component: '音', options: ['心', '音', '日'] },
        { context: ['顧', '？'], target: '客', radical: '宀', component: '各', options: ['宀', '口', '夂'] },
        { context: ['顯', '？'], target: '眼', radical: '艮', component: '目', options: ['艮', '良', '青'] },
        { context: ['驚', '？'], target: '訝', radical: '言', component: '牙', options: ['言', '口', '牙'] },
        { context: ['測', '？'], target: '驗', radical: '馬', component: '僉', options: ['馬', '木', '口'] },
        { context: ['身', '？'], target: '體', radical: '骨', component: '豊', options: ['月', '示', '骨'] },
        { context: ['溫', '？'], target: '暖', radical: '日', component: '爰', options: ['日', '火', '水'] }
      ]
    };

    // --- 遊戲運作變數 ---
    const MAX_HP = 5; // 給予學生較多容錯空間
    const EXP_PER_WIN = 10; 
    let activeQuestions = [];
    let currentHP = MAX_HP;
    let exp = 0;
    let currentLevel = 0; 
    let isAnimating = false; 

    // --- 計時器與後端設定 ---
    let startTime;
    let timerInterval;
    let timeElapsed = 0; // 秒數
    // 👇 未來請將這裡替換成你的 Google Apps Script URL
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsEdpsT6iT2myGETEk9JdHOYetehVo20H9XqdPvbw3bhnPMOnDu_RKQfcIdMPjlGSs/exec"; 

    // --- DOM 元素取得 ---
    const hpBar = document.getElementById('hp-bar');
    const hpText = document.getElementById('hp-text');
    const expScore = document.getElementById('exp-score');
    const levelIndicator = document.getElementById('level-indicator');
    const wordContextContainer = document.getElementById('word-context-container');
    const monsterChar = document.getElementById('monster-char');
    const optionsContainer = document.getElementById('options-container');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const gameContainer = document.getElementById('game-container');
    const startScreen = document.getElementById('start-screen');
    const timerText = document.getElementById('timer-text');

    // --- 計時器邏輯 ---
    function startTimer() {
      startTime = Date.now();
      timeElapsed = 0;
      updateTimerUI();
      timerInterval = setInterval(() => {
        timeElapsed = Math.floor((Date.now() - startTime) / 1000);
        updateTimerUI();
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function updateTimerUI() {
      const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
      const s = String(timeElapsed % 60).padStart(2, '0');
      timerText.innerText = `${m}:${s}`;
    }

    function formatTime(seconds) {
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    // --- 啟動遊戲 ---
    function startGame() {
      playSound('click');
      startScreen.classList.add('hidden');
      gameContainer.classList.remove('hidden');
      
      // 啟動 BGM
      if (isSoundEnabled) {
        bgmPlayer.volume = 0.4;
        bgmPlayer.play().catch(e => console.log("BGM 需要使用者進一步互動才能播放", e));
      }
      
      // 取得下拉式選單難度與題數
      const difficultySelect = document.getElementById('difficulty-select');
      const selectedDifficulty = difficultySelect.value;
      const selectedQuestionCount = parseInt(document.getElementById('count-select').value);
      
      // 依據選擇的難度與題數建立關卡陣列
      const fullBank = [...questionBanks[selectedDifficulty]].sort(() => Math.random() - 0.5);
      activeQuestions = fullBank.slice(0, selectedQuestionCount);
      
      currentHP = MAX_HP;
      exp = 0;
      currentLevel = 0;
      isAnimating = false;
      
      // 重置結算畫面狀態
      overlay.classList.add('hidden'); 
      document.getElementById('leaderboard-form').classList.add('hidden');
      document.getElementById('leaderboard-display').classList.add('hidden');
      document.getElementById('player-name').value = '';
      document.getElementById('submit-score-btn').disabled = false;
      document.getElementById('submit-score-btn').innerHTML = '送出成績';
      
      updateUI();
      loadQuestion();
      startTimer(); // 開始計時
    }

    // --- 載入題目 ---
    function loadQuestion() {
      const q = activeQuestions[currentLevel];
      
      levelIndicator.innerText = `關卡: ${currentLevel + 1}/${activeQuestions.length}`;
      
      // 渲染上方的語詞情境區
      wordContextContainer.innerHTML = '';
      q.context.forEach(char => {
        const charDiv = document.createElement('div');
        if (char === '？') {
          charDiv.className = 'w-14 h-14 sm:w-16 sm:h-16 bg-[#e8d5a6] border-2 border-dashed border-[#8b5a2b] rounded flex items-center justify-center text-3xl sm:text-4xl text-[#8b5a2b] font-bold word-blank transition-all';
          charDiv.innerText = '？';
        } else {
          charDiv.className = 'w-14 h-14 sm:w-16 sm:h-16 bg-[#d4b886] border border-[#8b5a2b] rounded flex items-center justify-center text-3xl sm:text-4xl text-[#3e2723] font-bold shadow-inner';
          charDiv.innerText = char;
        }
        wordContextContainer.appendChild(charDiv);
      });

      // 渲染怪物本體 (部首拼字)
      monsterChar.innerText = `？ + ${q.component}`;
      monsterChar.className = 'text-4xl sm:text-5xl font-bold bg-[#fdf5e6] px-6 py-4 rounded border-2 border-dashed border-[#8b5a2b] animate-float transition-all duration-300 text-center whitespace-nowrap shadow-md text-[#3e2723]';
      
      // 生成選項按鈕
      optionsContainer.innerHTML = '';
      const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

      shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.className = 'wood-btn text-3xl sm:text-4xl py-3 sm:py-4 rounded active:translate-y-1 active:border-b-0 transition-all font-bold';
        btn.onclick = () => checkAnswer(opt, btn);
        optionsContainer.appendChild(btn);
      });
    }

    // --- 檢查答案邏輯 ---
    function checkAnswer(selectedOption, btnElement) {
      if (isAnimating) return; 
      
      const q = activeQuestions[currentLevel];
      isAnimating = true; 

      if (selectedOption === q.radical) {
        playSound('correct');
        
        // 怪物動畫
        monsterChar.innerText = q.target;
        monsterChar.classList.remove('animate-float', 'border-dashed', 'bg-[#fdf5e6]', 'border-[#8b5a2b]');
        monsterChar.classList.add('animate-glow', 'border-solid', 'border-[#228b22]', 'bg-[#d4edda]', 'text-[#155724]');
        
        // 語詞情境區動畫 (填補空格)
        const blankBox = document.querySelector('.word-blank');
        blankBox.innerText = q.target;
        blankBox.classList.replace('border-dashed', 'border-solid');
        blankBox.classList.replace('border-[#8b5a2b]', 'border-[#228b22]');
        blankBox.classList.replace('bg-[#e8d5a6]', 'bg-[#d4edda]');
        blankBox.classList.replace('text-[#8b5a2b]', 'text-[#155724]');
        blankBox.classList.add('animate-glow');

        exp += EXP_PER_WIN;
        updateUI();

        setTimeout(() => {
          currentLevel++;
          if (currentLevel >= activeQuestions.length) {
            showGameOver(true);
          } else {
            loadQuestion();
            isAnimating = false; 
          }
        }, 1500); // 留 1.5 秒讓學生看清楚完整的詞語

      } else {
        playSound('wrong');
        currentHP--;
        updateUI();

        gameContainer.classList.add('animate-shake');
        btnElement.classList.remove('wood-btn');
        btnElement.classList.add('bg-red-700', 'border-b-4', 'border-red-900', 'text-white');

        if (currentHP <= 0) {
          setTimeout(() => showGameOver(false), 500); 
        } else {
          setTimeout(() => {
            gameContainer.classList.remove('animate-shake');
            btnElement.classList.remove('bg-red-700', 'border-b-4', 'border-red-900', 'text-white');
            btnElement.classList.add('wood-btn');
            isAnimating = false; 
          }, 500);
        }
      }
    }

    // --- 更新介面數值 ---
    function updateUI() {
      expScore.innerText = exp;
      hpText.innerText = `${currentHP}/${MAX_HP}`;
      const hpPercentage = (currentHP / MAX_HP) * 100;
      hpBar.style.width = `${hpPercentage}%`;
      
      // 根據血量改變血條顏色 (綠 -> 黃 -> 紅)
      hpBar.className = 'h-full w-full transition-all duration-300 ';
      if (hpPercentage > 50) {
        hpBar.classList.add('bg-green-500');
      } else if (hpPercentage > 20) {
        hpBar.classList.add('bg-yellow-500');
      } else {
        hpBar.classList.add('bg-red-500');
      }
    }

    // --- 遊戲結束/通關 畫面 ---
    function showGameOver(isWin) {
      stopTimer(); // 停止計時
      overlay.classList.remove('hidden');
      
      if (isWin) {
        playSound('correct'); 
        overlayTitle.innerText = "🎉 森林保衛成功！";
        overlayTitle.className = "text-3xl sm:text-4xl font-bold mb-4 text-[#2e8b57] text-center px-2";
        overlayDesc.innerText = `過關時間：${formatTime(timeElapsed)}\n獲得 ${exp} EXP！`;
        
        // 通關才顯示登錄排行榜表單
        document.getElementById('leaderboard-form').classList.remove('hidden');
      } else {
        overlayTitle.innerText = "💀 勇者倒下了...";
        overlayTitle.className = "text-3xl sm:text-4xl font-bold mb-4 text-red-700 text-center px-2";
        overlayDesc.innerText = `存活時間：${formatTime(timeElapsed)}\n部首拼錯太多次了，回村莊休息吧！`;
      }
    }

    // --- 排行榜 API 邏輯 (支援 Google Sheets 與 單機暫存) ---
    async function submitScore() {
      playSound('click');
      const playerName = document.getElementById('player-name').value.trim();
      if (!playerName) {
        alert('請輸入你的名字喔！');
        return;
      }

      const submitBtn = document.getElementById('submit-score-btn');
      const difficultyMap = { easy: '初級', medium: '中級', hard: '高級' };
      const selectedDifficulty = document.getElementById('difficulty-select').value;
      const selectedQuestionCount = parseInt(document.getElementById('count-select').value);
      
      // 按鈕載入動畫
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loader"></span> 傳送中...';
      
      const payload = {
        name: playerName,
        time: timeElapsed,
        timeStr: formatTime(timeElapsed),
        difficulty: difficultyMap[selectedDifficulty],
        count: selectedQuestionCount
      };

      try {
        if (!GOOGLE_SCRIPT_URL) throw new Error("尚未設定 URL");
        
        // 傳送給 Google Apps Script (使用 GET 避免 CORS 複雜設定)
        const params = new URLSearchParams(payload).toString();
        await fetch(`${GOOGLE_SCRIPT_URL}?action=add&${params}`, { mode: 'no-cors' });
        
        handleSubmitSuccess();
      } catch (error) {
        console.warn("使用單機暫存模式:", error);
        saveLocalScore(payload);
        handleSubmitSuccess(true);
      }
    }

    function handleSubmitSuccess(isLocal = false) {
      document.getElementById('leaderboard-form').classList.add('hidden');
      document.getElementById('leaderboard-display').classList.remove('hidden');
      
      const difficultyMap = { easy: '初級', medium: '中級', hard: '高級' };
      const diff = difficultyMap[document.getElementById('difficulty-select').value];
      const cnt = document.getElementById('count-select').value;
      
      document.getElementById('current-mode-label').innerText = `目前顯示：${diff} / ${cnt}題`;
      fetchLeaderboard(isLocal, 'leaderboard-list', diff, cnt);
    }

    async function fetchLeaderboard(isLocal, targetListId = 'leaderboard-list', filterDiff = '初級', filterCnt = '5') {
      const listEl = document.getElementById(targetListId);
      listEl.innerHTML = '<div class="text-center text-[#8b5a2b] py-4"><span class="loader"></span> 載入中...</div>';

      try {
        if (!GOOGLE_SCRIPT_URL || isLocal) throw new Error("Use local");
        
        // 加上查詢參數供後端過濾
        const url = `${GOOGLE_SCRIPT_URL}?action=getTop10&difficulty=${encodeURIComponent(filterDiff)}&count=${encodeURIComponent(filterCnt)}`;
        const response = await fetch(url);
        
        if (!response.ok) throw new Error("網路回應異常");
        const data = await response.json();
        renderLeaderboard(data, targetListId);
      } catch (error) {
        console.warn("讀取排行榜失敗，切換單機模式：", error);
        // 單機模擬排序邏輯與過濾
        const localData = JSON.parse(localStorage.getItem('pixelHeroScores') || '[]');
        
        // 依據選擇的模式過濾
        const filteredData = localData.filter(d => d.difficulty === filterDiff && String(d.count) === String(filterCnt));
        
        filteredData.sort((a, b) => a.time - b.time); // 只比時間
        
        renderLeaderboard(filteredData.slice(0, 10), targetListId);
        
        if (!GOOGLE_SCRIPT_URL) {
          const msg = document.createElement('div');
          msg.className = 'text-xs text-[#8b5a2b] font-bold text-center mt-3 border-t border-[#8b5a2b] pt-2';
          msg.innerText = '💡 目前為單機暫存模式，未綁定 Google 試算表';
          listEl.appendChild(msg);
        }
      }
    }

    function renderLeaderboard(data, targetListId = 'leaderboard-list') {
      const listEl = document.getElementById(targetListId);
      listEl.innerHTML = '';
      
      if (!data || data.length === 0) {
        listEl.innerHTML = '<div class="text-center text-[#5c4033] py-2 font-bold">目前還沒有人挑戰成功喔！</div>';
        return;
      }

      data.forEach((entry, index) => {
        const item = document.createElement('div');
        // 前三名給予特別的底色
        item.className = `flex justify-between items-center p-2 rounded ${index === 0 ? 'bg-[#d4b886] border-2 border-[#b8860b] shadow-sm' : (index % 2 === 0 ? 'bg-[#eaddb5]/50' : 'bg-transparent')}`;
        
        let medal = `${index + 1}.`;
        if (index === 0) medal = '🥇';
        if (index === 1) medal = '🥈';
        if (index === 2) medal = '🥉';

        // 🛡️ 終極防護：無視試算表自動轉換的時間戳記，直接用寫入的「秒數 (entry.time)」重新轉換！
        const displayTime = entry.time ? formatTime(entry.time) : entry.timeStr;

        // 優化排版：只顯示名次、姓名、標籤、時間，並強制左右對齊
        item.innerHTML = `
          <div class="flex items-center gap-2 overflow-hidden w-[55%]">
            <span class="w-6 text-center font-bold text-[#b8860b] text-lg">${medal}</span>
            <span class="font-bold text-[#3e2723] truncate text-base sm:text-lg" title="${entry.name}">${entry.name}</span>
          </div>
          <div class="flex items-center justify-end gap-2 w-[45%]">
            <span class="bg-[#d4b886] px-1.5 py-0.5 rounded text-[11px] sm:text-xs border border-[#8b5a2b] text-[#5c4033] font-bold whitespace-nowrap shadow-inner">${entry.difficulty[0]}${entry.count}</span>
            <span class="text-[#004d00] font-mono w-14 text-right font-bold text-base sm:text-lg">${displayTime}</span>
          </div>
        `;
        listEl.appendChild(item);
      });
    }

    // --- 單機測試用儲存 ---
    function saveLocalScore(payload) {
      const scores = JSON.parse(localStorage.getItem('pixelHeroScores') || '[]');
      scores.push(payload);
      localStorage.setItem('pixelHeroScores', JSON.stringify(scores));
    }
  </script>
