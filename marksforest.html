<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>標點森林大冒險 - 8-bit 可愛森林版</title>
    <!-- 引入開源的注音字型 (BPMF) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- UI/UX 設計：8-bit 像素森林風與 RWD 響應式設計 --- */
        /* 為了使用注音，我們需要定義一個支援注音的字體族群 */
        @font-face {
            font-family: 'BPMF';
            /* 💡 教師自訂字體區：
               現在設定為讀取您放在 GitHub 上的字體檔。
               請將您的注音字體檔案重新命名為「BPMF.woff2」或「BPMF.ttf」，
               並將它與這個 index.html 放在同一個資料夾中即可！
               (註：在還沒上傳字體到 GitHub 前，目前的預覽畫面可能會暫時退回一般字體喔)
            */
            src: url('BPMF.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            /* 優先使用注音字體，如果失敗則退回標準字體 */
            font-family: 'BPMF', 'BiauKai', 'DFKai-SB', 'Noto Sans TC', '微軟正黑體', sans-serif;
            
            /* --- 🎨 教師自訂背景圖區 --- */
            /* 如果您沒有設定圖片，預設會顯示這個柔和的森林淺綠色 */
            background-color: #E8F5E9; 
            
            /* 老師，請將您的圖片網址或檔名放在下方 url('') 的單引號中間！
               💡 祕訣：如果您把圖片 (例如 bg.jpg) 跟這個 index.html 放在 GitHub 的同一個資料夾，
               可以直接寫成： background-image: url('bg.jpg');
            */
            background-image: url(''); 
            
            /* 讓背景圖片漂亮地填滿整個畫面，且不會跟著滾動 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            /* --------------------------- */
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            color: #3E2723; /* 深木頭色文字，增加對比度 */
            overflow: hidden; 
        }

        /* 遊戲主面板：立體積木感 */
        #game-container {
            background-color: #FFFFFA;
            border: 6px solid #3E2723;
            border-radius: 16px;
            padding: 30px 40px;
            /* 復古 8-bit 風格的硬陰影 */
            box-shadow: 8px 8px 0px #3E2723;
            width: 90%;
            max-width: 650px;
            position: relative;
        }

        h1 { 
            color: #2E7D32; 
            font-size: 2.2rem; 
            margin-top: 0; 
            text-shadow: 2px 2px 0px #A5D6A7; /* 可愛文字陰影 */
            /* 標題不一定要注音，維持清晰即可，視需求調整 */
            font-family: 'BiauKai', 'DFKai-SB', 'Noto Sans TC', sans-serif; 
        }
        
        .level-info { 
            font-size: 1.3rem; 
            color: #555; 
            margin-bottom: 25px; 
            font-weight: bold; 
            background-color: #E8F5E9;
            display: inline-block;
            padding: 5px 15px;
            border: 3px solid #3E2723;
            border-radius: 10px;
            box-shadow: 3px 3px 0px #3E2723;
            font-family: 'BiauKai', 'DFKai-SB', 'Noto Sans TC', sans-serif; 
        }
        
        /* 句子顯示區塊 (此處需要確保注音字體套用) */
        #sentence-box {
            font-size: 2.5rem; /* 注音字體通常需要比較大一點才清楚 */
            line-height: 2.8; /* 增加行距以容納注音符號 */
            margin-bottom: 30px;
            padding: 25px;
            background-color: #FFF9C4; 
            border: 4px solid #FBC02D;
            border-radius: 12px;
            word-wrap: break-word;
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.05); /* 內部微微凹陷感 */
        }
        
        /* 挖空的格子 */
        .blank-slot {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px dashed #FF9800;
            border-radius: 8px;
            vertical-align: middle;
            margin: 0 6px;
            cursor: pointer;
            background-color: #FFF;
            transition: all 0.2s;
            line-height: 48px;
            text-align: center;
            box-shadow: 3px 3px 0px rgba(255, 152, 0, 0.3);
            /* 讓格子內的標點符號不帶注音，保持純粹 */
            font-family: 'BiauKai', 'DFKai-SB', 'Noto Sans TC', sans-serif; 
        }
        .blank-slot.active {
            border: 4px solid #F44336;
            border-style: solid;
            background-color: #FFCDD2;
            transform: scale(1.15);
            box-shadow: 4px 4px 0px #D32F2F;
        }
        
        /* 標點符號按鈕鍵盤：大顆粒遊戲按鍵感 */
        #keyboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .symbol-btn {
            font-size: 2rem;
            padding: 12px;
            border: 4px solid #3E2723;
            border-radius: 12px;
            background-color: #81D4FA;
            color: #3E2723;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #3E2723; /* 立體陰影 */
            transition: transform 0.1s, box-shadow 0.1s;
            /* 按鈕上的標點符號使用標準字體即可 */
            font-family: 'BiauKai', 'DFKai-SB', 'Noto Sans TC', sans-serif; 
        }
        .symbol-btn:active {
            transform: translateY(6px); /* 按下去的效果 */
            box-shadow: 0 0 0 #3E2723;
            background-color: #4FC3F7;
        }
        
        /* 狀態回饋文字 */
        #feedback {
            font-size: 1.6rem;
            font-weight: bold;
            height: 35px;
            margin-top: 25px;
            color: #4CAF50;
            text-shadow: 1px 1px 0px #FFF;
            font-family: 'BiauKai', 'DFKai-SB', 'Noto Sans TC', sans-serif; 
        }
        
        /* --- 教學提示彈出視窗 (Modal) --- */
        #hint-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); 
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px); 
        }
        .modal-content {
            background-color: #FFF;
            padding: 40px 30px;
            border-radius: 16px;
            width: 85%;
            max-width: 420px;
            border: 6px solid #3E2723;
            box-shadow: 10px 10px 0px #3E2723; /* 彈出視窗也有可愛立體陰影 */
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .modal-title {
            color: #E65100;
            font-size: 2rem;
            margin-bottom: 20px;
            margin-top: 0;
            text-shadow: 2px 2px 0px #FFE082;
            font-family: 'BiauKai', 'DFKai-SB', 'Noto Sans TC', sans-serif; 
        }
        #hint-text {
            font-size: 1.8rem; /* 提示文字也變大，因為使用注音字體 */
            line-height: 2.2;
            color: #3E2723;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .retry-btn {
            font-size: 1.5rem;
            padding: 12px 30px;
            background-color: #A5D6A7;
            color: #3E2723;
            border: 4px solid #3E2723;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #3E2723;
            font-family: 'BiauKai', 'DFKai-SB', 'Noto Sans TC', sans-serif; 
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .retry-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #3E2723;
            background-color: #81C784;
        }

        @keyframes popIn {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🌲 標點森林大冒險 🌲</h1>
    <div class="level-info">第 <span id="current-level">1</span> 關 / 共 <span id="total-levels"></span> 關</div>
    
    <div id="sentence-box">
        <!-- 題目會動態生成在這裡 -->
    </div>

    <!-- 絕對只包含您指定的 8 個符號 -->
    <div id="keyboard">
        <button class="symbol-btn" onclick="insertSymbol('，')">，</button>
        <button class="symbol-btn" onclick="insertSymbol('。')">。</button>
        <button class="symbol-btn" onclick="insertSymbol('！')">！</button>
        <button class="symbol-btn" onclick="insertSymbol('？')">？</button>
        <button class="symbol-btn" onclick="insertSymbol('、')">、</button>
        <button class="symbol-btn" onclick="insertSymbol('：')">：</button>
        <button class="symbol-btn" onclick="insertSymbol('「')">「</button>
        <button class="symbol-btn" onclick="insertSymbol('」')">」</button>
    </div>

    <div id="feedback"></div>
</div>

<!-- 教學提示彈出視窗 -->
<div id="hint-modal">
    <div class="modal-content">
        <h2 class="modal-title">💡 說書人小提示</h2>
        <div id="hint-text">這裡會顯示教學提示</div>
        <button class="retry-btn" onclick="closeHintAndRetry()">我知道了，再試一次</button>
    </div>
</div>

<script>
    /* --- 教師自訂題庫與教學提示區 --- */
    const questions = [
        { 
            text: "小鳥在樹上唱歌_", 
            answers: ["。"],
            hint: "這句話已經完整說完了喔！說完一句話的最後，要用圓圓的「句號（。）」來結束。"
        },
        { 
            text: "我喜歡吃蘋果_香蕉和芭樂_", 
            answers: ["、", "。"],
            hint: "「蘋果」和「香蕉」都是水果，把它們並列在一起時，中間要用像瓜子一樣的「頓號（、）」。最後說完了再用「句號（。）」。"
        },
        { 
            text: "天啊_那是一隻大恐龍嗎_", 
            answers: ["！", "？"],
            hint: "「天啊」表示很驚訝，要用「驚嘆號（！）」。後面在問問題，所以要用像耳朵一樣的「問號（？）」。"
        },
        { 
            text: "老師說__大家要專心上課__", 
            answers: ["：", "「", "。", "」"],
            hint: "遇到「某某人說」的時候，要先用兩個點的「冒號（：）」，然後用「引號（「」）」把他說的話包起來。引號裡面說完話了，也要記得加上「句號（。）」喔！"
        },
        { 
            text: "弟弟不小心跌倒了_他哭得很傷心_", 
            answers: ["，", "。"],
            hint: "話說到一半需要停頓休息一下，要用「逗號（，）」。整句話說完了，才用「句號（。）」。"
        },
        { 
            text: "媽媽問__今天在學校好玩嗎__", 
            answers: ["：", "「", "？", "」"],
            hint: "有人說話或問問題時，要用「冒號（：）」和「引號（「」）」。引號裡面是一句問話，所以要用「問號（？）」喔！"
        },
        { 
            /* 新增：多個頓號的題目 */
            text: "動物園裡有大象_獅子_猴子和長頸鹿_", 
            answers: ["、", "、", "。"],
            hint: "「大象」、「獅子」、「猴子」都是動物，把它們並列在一起時，中間都要用像瓜子一樣的「頓號（、）」。整句話說完後要加上「句號（。）」。"
        },
        { 
            text: "妹妹開心地大叫__太棒了__", 
            answers: ["：", "「", "！", "」"],
            hint: "遇到大叫或說話時，要用「冒號（：）」和「引號（「」）」。引號裡面是很開心的心情，所以要用「驚嘆號（！）」。"
        },
        { 
            text: "你要喝果汁_還是喝牛奶呢_", 
            answers: ["，", "？"],
            hint: "句子中間稍微停頓要用「逗號（，）」。最後是在問問題，所以要用「問號（？）」。"
        },
        { 
            text: "早安_今天天氣真好_", 
            answers: ["，", "。"],
            hint: "「早安」打完招呼後稍微停頓，用「逗號（，）」。這句話說完了，最後用「句號（。）」。"
        }
    ];

    let currentLevelIndex = 0;
    let currentSlots = [];
    let activeSlotIndex = 0;

    // --- 洗牌函數 (打亂題目順序) ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function initGame() {
        shuffleArray(questions); // 每次載入遊戲時，自動打亂題庫順序
        document.getElementById("total-levels").innerText = questions.length;
        loadLevel();
    }

    function loadLevel() {
        if (currentLevelIndex >= questions.length) {
            document.getElementById("sentence-box").innerHTML = "🎉 恭喜過關！<br>你已經是標點小達人了！";
            document.getElementById("keyboard").classList.add("hidden");
            document.getElementById("feedback").innerText = "";
            return;
        }

        document.getElementById("current-level").innerText = currentLevelIndex + 1;
        document.getElementById("feedback").innerText = "";
        
        const q = questions[currentLevelIndex];
        const sentenceBox = document.getElementById("sentence-box");
        sentenceBox.innerHTML = "";
        currentSlots = [];
        activeSlotIndex = 0;

        let parts = q.text.split("_");
        for (let i = 0; i < parts.length; i++) {
            if (parts[i]) {
                const span = document.createElement("span");
                span.innerText = parts[i];
                sentenceBox.appendChild(span);
            }
            if (i < parts.length - 1) {
                const slot = document.createElement("span");
                slot.className = "blank-slot";
                slot.dataset.index = i;
                slot.onclick = () => setActiveSlot(i);
                sentenceBox.appendChild(slot);
                currentSlots.push(slot);
            }
        }
        
        if(currentSlots.length > 0) setActiveSlot(0);
    }

    function setActiveSlot(index) {
        currentSlots.forEach(slot => slot.classList.remove("active"));
        activeSlotIndex = index;
        currentSlots[activeSlotIndex].classList.add("active");
    }

    function insertSymbol(symbol) {
        if (currentSlots.length === 0) return;

        const activeSlot = currentSlots[activeSlotIndex];
        activeSlot.innerText = symbol;
        activeSlot.style.border = "4px solid transparent"; /* 取消虛線，保持大小不變 */
        activeSlot.style.color = "#E91E63";
        activeSlot.style.fontWeight = "bold";

        let allFilled = true;
        let userAnswer = [];
        currentSlots.forEach(slot => {
            if (!slot.innerText) allFilled = false;
            userAnswer.push(slot.innerText);
        });

        if (!allFilled) {
            for(let i = 0; i < currentSlots.length; i++) {
                if(!currentSlots[i].innerText) {
                    setActiveSlot(i);
                    break;
                }
            }
        } else {
            checkAnswer(userAnswer);
        }
    }

    function checkAnswer(userAnswer) {
        const currentQuestion = questions[currentLevelIndex];
        const correctAnswers = currentQuestion.answers;
        let isCorrect = true;

        for (let i = 0; i < correctAnswers.length; i++) {
            if (userAnswer[i] !== correctAnswers[i]) {
                isCorrect = false;
                break;
            }
        }

        const feedback = document.getElementById("feedback");
        if (isCorrect) {
            feedback.style.color = "#2E7D32";
            feedback.innerText = "✨ 太棒了！完全正確！";
            setTimeout(() => {
                currentLevelIndex++;
                loadLevel();
            }, 1500);
        } else {
            // 答錯時，呼叫顯示教學提示的功能
            showHint(currentQuestion.hint);
        }
    }

    function showHint(hintText) {
        document.getElementById("hint-text").innerText = hintText;
        document.getElementById("hint-modal").style.display = "flex";
    }

    function closeHintAndRetry() {
        document.getElementById("hint-modal").style.display = "none";
        // 清空這一關的答案，讓學生重新挑戰
        loadLevel(); 
    }

    window.onload = initGame;
</script>

</body>
</html>
