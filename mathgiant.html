<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>光之巨人防衛戰 - 數學計算大冒險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            touch-action: manipulation; /* 優化觸控反應速度 */
        }

        /* 畫面震動動畫 (答對或受到攻擊時可用) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-effect { animation: shake 0.3s ease-in-out; }

        /* 簡單的光波漸層動畫 */
        .laser-gradient {
            background: linear-gradient(90deg, transparent, #22d3ee, #fff, #22d3ee, transparent);
            background-size: 200% 100%;
            animation: moveGradient 0.5s linear infinite;
        }
        @keyframes moveGradient {
            0% { background-position: 100% 0%; }
            100% { background-position: -100% 0%; }
        }
    </style>
</head>
<body class="bg-slate-900 text-white h-screen flex flex-col items-center justify-between p-4 overflow-hidden select-none">

    <div class="w-full max-w-2xl flex justify-between items-center px-6 py-3 mt-2 bg-slate-800/90 rounded-2xl border border-slate-600 shadow-2xl backdrop-blur-md">
        <div class="flex flex-col">
            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">Defense Sector</span>
            <span class="text-xl font-black text-white">地球防衛總部</span>
        </div>
        <div class="text-right">
            <span class="text-xs text-cyan-400 font-bold uppercase tracking-widest">Monsters Defeated</span>
            <div class="text-3xl font-black text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]">
                <span id="score">0</span>
            </div>
        </div>
    </div>

    <div id="game-screen" class="relative w-full max-w-2xl flex-1 my-4 bg-gradient-to-b from-slate-900 via-slate-800 to-slate-900 rounded-[2rem] border-4 border-cyan-500/30 overflow-hidden shadow-[inset_0_0_60px_rgba(0,0,0,0.5),0_0_40px_rgba(6,182,212,0.2)]">
        
        <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#22d3ee 1px, transparent 1px); background-size: 30px 30px;"></div>

        <div id="laser-beam" class="absolute top-1/2 left-1/4 right-20 h-10 laser-gradient hidden shadow-[0_0_30px_#22d3ee] transform -translate-y-1/2 z-10 rounded-full"></div>
        
        <div id="monster-unit" class="absolute top-1/4 left-10 flex flex-col items-center transition-all duration-500">
            <div id="math-question" class="bg-red-600 text-white font-black text-4xl md:text-5xl px-8 py-4 rounded-3xl mb-6 border-4 border-red-400 shadow-[0_0_25px_rgba(239,68,68,0.7)] transform -rotate-2">
                -- + --
            </div>
            <div class="text-8xl drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] animate-bounce" style="animation-duration: 2s;">👾</div>
        </div>

        <div class="absolute bottom-10 right-10 text-[100px] transform scale-x-[-1] drop-shadow-[0_0_30px_rgba(34,211,238,0.6)]">
            🦸‍♂️
        </div>
    </div>

    <div class="w-full max-w-2xl bg-slate-800/50 p-4 md:p-6 rounded-[2.5rem] border border-slate-700/50 shadow-2xl backdrop-blur-xl mb-2">
        
        <div class="mb-5 bg-slate-950/80 border-2 border-cyan-500/30 rounded-2xl h-20 flex items-center justify-center shadow-inner">
            <span id="display-answer" class="text-5xl font-black text-cyan-400 tracking-[0.5em] drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]"></span>
            <span class="animate-pulse w-1 h-10 bg-cyan-500 ml-2"></span>
        </div>

        <div class="grid grid-cols-3 gap-3 md:gap-4 h-72">
            <button onclick="appendNum('1')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">1</button>
            <button onclick="appendNum('2')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">2</button>
            <button onclick="appendNum('3')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">3</button>
            <button onclick="appendNum('4')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">4</button>
            <button onclick="appendNum('5')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">5</button>
            <button onclick="appendNum('6')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">6</button>
            <button onclick="appendNum('7')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">7</button>
            <button onclick="appendNum('8')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">8</button>
            <button onclick="appendNum('9')" class="numpad-btn bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">9</button>
            
            <button onclick="clearInput()" class="bg-rose-900/80 hover:bg-rose-800 text-rose-100 text-xl font-bold rounded-2xl border-b-4 border-rose-950 active:scale-95 transition-all">刪除</button>
            <button onclick="appendNum('0')" class="bg-slate-700 hover:bg-slate-600 active:scale-95 text-3xl font-bold rounded-2xl border-b-4 border-slate-900 transition-all">0</button>
            <button onclick="checkAnswer()" class="bg-cyan-600 hover:bg-cyan-500 text-white text-xl font-black rounded-2xl border-b-4 border-cyan-800 active:scale-95 transition-all">發射光波</button>
        </div>
    </div>

    <script>
        // --- 遊戲邏輯變數 ---
        let currentAnswer = 0;
        let score = 0;
        let userInput = "";
        
        const questionEl = document.getElementById('math-question');
        const displayEl = document.getElementById('display-answer');
        const scoreEl = document.getElementById('score');
        const laserBeam = document.getElementById('laser-beam');
        const gameScreen = document.getElementById('game-screen');

        // --- 核心出題邏輯：精準控制二位數進退位 ---
        function generateQuestion() {
            const isAddition = Math.random() > 0.5;

            if (isAddition) {
                // 進位加法：個位數相加 >= 10
                let unit1 = Math.floor(Math.random() * 8) + 2; // 2~9
                let unit2 = Math.floor(Math.random() * (10 - unit1)) + (10 - unit1); 
                if (unit2 > 9) unit2 = 9;

                // 十位數控制在相加不超過 90
                let ten1 = Math.floor(Math.random() * 6) + 1; // 1~6
                let ten2 = Math.floor(Math.random() * (8 - ten1)) + 1; 

                const num1 = ten1 * 10 + unit1;
                const num2 = ten2 * 10 + unit2;
                currentAnswer = num1 + num2;
                questionEl.textContent = `${num1} + ${num2}`;
            } else {
                // 退位減法：被減數個位 < 減數個位
                let unit1 = Math.floor(Math.random() * 8); // 0~7
                let unit2 = Math.floor(Math.random() * (9 - unit1)) + unit1 + 1; // 確保大於 unit1

                let ten1 = Math.floor(Math.random() * 7) + 3; // 3~9
                let ten2 = Math.floor(Math.random() * (ten1 - 1)) + 1; 

                const num1 = ten1 * 10 + unit1;
                const num2 = ten2 * 10 + unit2;
                currentAnswer = num1 - num2;
                questionEl.textContent = `${num1} - ${num2}`;
            }
            userInput = "";
            updateDisplay();
        }

        // --- 虛擬鍵盤操作 ---
        function appendNum(num) {
            if (userInput.length < 3) {
                userInput += num;
                updateDisplay();
            }
        }

        function clearInput() {
            userInput = userInput.slice(0, -1);
            updateDisplay();
        }

        function updateDisplay() {
            displayEl.textContent = userInput;
        }

        // --- 判斷答案與特效 ---
        function checkAnswer() {
            if (userInput === "") return;
            const userAnswer = parseInt(userInput, 10);

            if (userAnswer === currentAnswer) {
                // 答對：擊退特效
                score++;
                scoreEl.textContent = score;
                
                // 顯示雷射光波
                laserBeam.classList.remove('hidden');
                gameScreen.classList.add('shake-effect');
                
                // 300毫秒後重置並換題
                setTimeout(() => {
                    laserBeam.classList.add('hidden');
                    gameScreen.classList.remove('shake-effect');
                    generateQuestion();
                }, 400);
            } else {
                // 答錯：警告特效
                displayEl.classList.add('text-rose-500');
                gameScreen.classList.add('border-rose-500/50');
                setTimeout(() => {
                    displayEl.classList.remove('text-rose-500');
                    gameScreen.classList.remove('border-rose-500/50');
                    userInput = "";
                    updateDisplay();
                }, 400);
            }
        }

        // 初始化遊戲
        window.onload = generateQuestion;
    </script>
</body>
</html>
