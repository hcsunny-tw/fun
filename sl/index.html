<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松林雙語Fun：英語口說闖關</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background-color: #FFF9E6;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #FF7F50; font-size: 2.5em; margin-bottom: 5px; } /* 標題放大 */
        
        .container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px; /* 稍微放寬以適應平板 */
            margin: 0 auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border: 4px solid #FFD700;
        }
        
        /* 🌟 優化 2：Logo 放大並增加互動效果 */
        .school-logo { 
            width: 300px; /* 放大 Logo */
            max-width: 80%; 
            height: auto; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .school-logo:hover {
            transform: scale(1.05);
        }
        
        #login-section { display: block; }
        #level-section, #read-section { display: none; }
        
        .login-box {
            background-color: #F0F8FF;
            padding: 30px 20px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 500px;
            border: 2px dashed #4682B4;
        }
        .input-group { margin: 20px 0; }
        .input-group label { font-size: 1.5em; font-weight: bold; color: #4682B4; display: block; margin-bottom: 10px; }
        
        /* 🌟 優化 1：輸入框放大，適合平板觸控 */
        .code-input {
            font-size: 1.8em;
            padding: 15px;
            width: 80%;
            text-align: center;
            border: 3px solid #ccc;
            border-radius: 15px;
            font-family: inherit;
        }
        
        .level-btn {
            display: block;
            width: 85%;
            margin: 20px auto;
            background-color: #FFA500;
            color: white;
            padding: 20px; /* 放大點擊範圍 */
            font-size: 1.5em;
            border-radius: 20px;
            border: 3px solid #FF8C00;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
            line-height: 1.4;
        }
        .level-btn:hover { transform: scale(1.02); background-color: #FF8C00; }
        .level-completed { background-color: #32CD32; border-color: #228B22; }
        .level-stats { font-size: 0.9em; color: #FFF; font-weight: normal; margin-top: 8px; display: block;}
        
        #script-display {
            font-size: 2.5em; /* 放大字體保護視力 */
            line-height: 1.6;
            color: #4682B4;
            margin: 25px 0;
            text-align: left;
            padding: 25px;
            background-color: #F0F8FF;
            border-radius: 15px;
            border: 2px solid #B0C4DE;
        }
        
        /* 🌟 優化 1：按鈕放大，適合平板觸控 */
        .btn {
            background-color: #32CD32;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
        }
        .btn:hover { background-color: #228B22; transform: translateY(-2px); }
        .btn-stop { background-color: #FF6347; }
        .btn-stop:hover { background-color: #DC143C; }
        .btn-back { background-color: #87CEFA; color: #333; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-listen { background-color: #9370DB; color: white; margin-bottom: 20px; }
        .btn-listen:hover { background-color: #8A2BE2; }
        
        .pet-container {
            background-color: #E6E6FA;
            border-radius: 20px;
            padding: 20px;
            margin: 20px auto;
            width: 85%;
            border: 3px dashed #9370DB;
        }
        .pet-emoji { font-size: 5em; margin: 15px 0; }
        .pet-title { font-size: 1.5em; font-weight: bold; color: #4B0082; }
        
        .combo-text {
            font-size: 1.8em;
            font-weight: bold;
            color: #FF4500;
            margin-top: 15px;
            animation: pulse 1s infinite;
            display: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        #result-box {
            margin-top: 25px;
            font-size: 1.4em;
            text-align: left;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #E0E0E0;
            display: none;
        }
        .stars-display { color: #FFD700; font-size: 3em; margin-top: 15px; }
        .upload-status {
            color: #C71585;
            font-weight: bold;
            font-size: 1.3em;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="./logo.png" alt="松林雙語Fun Logo" class="school-logo" id="school-logo" onclick="window.backToLogin()" title="回首頁">
    <!-- 1. 登入區塊 -->
    <div id="login-section">
        <div class="login-box">
            <div class="input-group">
                <label for="class-input">你的班級 (例如: 601)</label>
                <input type="number" id="class-input" class="code-input" placeholder="請輸入班級">
            </div>
            <div class="input-group">
                <label for="seat-input">你的座號 (例如: 05)</label>
                <input type="number" id="seat-input" class="code-input" placeholder="請輸入座號">
            </div>
            <button class="btn" onclick="window.loginAndFetchTask()">🚀 進入挑戰大廳</button>
        </div>
        <p style="color: gray; font-size: 1em;">提示：老師可測試備用帳號 601 班 30 號</p>
    </div>

    <!-- 2. 關卡選擇區塊 -->
    <div id="level-section">
        <h2 style="color: #4682B4; font-size: 1.8em;">歡迎，<span id="welcome-student-id"></span>！</h2>
        
        <!-- 寵物進化區塊 -->
        <div class="pet-container">
            <div class="pet-title" id="pet-title">🥚 神秘的寵物蛋 (0 顆星)</div>
            <div class="pet-emoji" id="pet-emoji">🥚</div>
            <div style="font-size: 1.1em; color: #666;">累積星星，讓你的專屬寵物進化吧！</div>
        </div>

        <p style="font-size: 1.4em; color: #666;">請選擇你要挑戰的關卡：</p>
        
        <div id="level-list">
            <!-- 關卡按鈕會由 JS 動態生成 -->
        </div>
        
        <button class="btn btn-back" style="margin-top: 30px;" onclick="window.backToLogin()">🔙 換人登入</button>
    </div>

    <!-- 3. 朗讀區塊 -->
    <div id="read-section">
        <h2 style="color: #8B4513; background-color: #FFE4B5; display: inline-block; padding: 10px 25px; border-radius: 20px; font-size: 1.5em;">
            <span id="student-identity"></span> - <span id="task-title"></span>
        </h2>
        <br>
        <button class="btn btn-listen" onclick="window.playAudio()">🔊 聽老師唸一次</button>
        <div id="script-display"></div>
        
        <button class="btn" id="start-btn" onclick="window.startRecordingAndRecognition()">🎤 開始朗讀</button>
        <button class="btn btn-stop" id="stop-btn" onclick="window.stopRecordingAndRecognition()" style="display: none;">⏹ 唸完了！</button>
        <button class="btn btn-back" onclick="window.backToLevelSelection()">🔙 回關卡大廳</button>

        <div id="result-box">
            <h3 style="margin-top: 0;">系統聽到的：</h3>
            <p id="recognized-text" style="color: gray;">(等待語音輸入...)</p>
        </div>

        <div id="score-board">
            <div class="stars-display" id="stars-display"></div>
            <div id="combo-display" class="combo-text">🔥 0 Combo 連擊！</div>
            <p style="font-size: 1.8em; font-weight: bold; margin-top: 10px;">準確率：<span id="score-text">0</span>%</p>
            <p id="upload-status" class="upload-status">🔊 完美達成！已將這關的聲音上傳給老師！</p>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 👩‍🏫 老師設定區：Google Apps Script 與題庫
    // ==========================================

    // 🌟 請在這裡填入你部署好的 Google Apps Script (GAS) 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwq5fwQ5BRISqZIL8eu0LWceIrkTTVwJk39mEvq-1Cp_jTMuEEimFisKojjNwhpJjCkCA/exec"; 

    // 🌟 你的 Google 試算表網址 (已包含自動轉換功能)
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1LgbSMV4hFCDB2PIyZzp35hpYB8dRJ34-ypBHQKjx8oA/edit?usp=sharing"; 

    // 本地題庫 (當網路出錯時的備案)
    const localTaskDatabase = {
        "601_5": [
            { title: "第一關：自我介紹", text: "Hello, my name is Capybara. I am ten years old. Nice to meet you." },
            { title: "第二關：英語校園導覽", text: "Welcome to our school. This is the library. We can read books here." },
            { title: "第三關：英語故事短文朗讀", text: "Once upon a time, there was a little turtle. He walked very slowly but never gave up." }
        ]
    };

    // ==========================================

    let currentStudentId = "";
    let currentStudentTasks = []; 
    let currentLevelIndex = 0;    
    let fetchedTasks = {}; 
    
    // 從瀏覽器本地儲存讀取過去的最高分紀錄
    let sessionScores = JSON.parse(localStorage.getItem('matsubayashi_scores')) || {}; 
    let petData = JSON.parse(localStorage.getItem('matsubayashi_pets')) || {}; 
    const petEmojis = ['🐶', '🐱', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐧', '🦉', '🦄', '🦖', '🦫', '🐰', '🐹']; 

    // 網頁載入時直接讀取題庫
    window.onload = async function() {
        await loadTasks();
    };

    // --- 載入題庫邏輯 ---
    async function loadTasks() {
        if (GOOGLE_SHEET_CSV_URL) {
            try {
                let fetchUrl = GOOGLE_SHEET_CSV_URL;
                if (fetchUrl.includes('/edit')) {
                    fetchUrl = fetchUrl.substring(0, fetchUrl.indexOf('/edit')) + '/export?format=csv';
                }

                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const csvData = await response.text();
                
                if (csvData.trim().startsWith('<!DOCTYPE html>')) {
                    alert("⚠️ 無法讀取 Google 表單！請確認表單設定為「知道連結的人都能查看」。");
                    fetchedTasks = localTaskDatabase;
                } else {
                    parseCSV(csvData);
                }
            } catch (e) {
                console.error("無法讀取 Google 表單，改用本地題庫", e);
                fetchedTasks = localTaskDatabase;
            }
        } else {
            fetchedTasks = localTaskDatabase;
        }
    }

    function parseCSV(csvText) {
        csvText = csvText.replace(/\r/g, ''); 
        
        const rows = [];
        let currentRow = [];
        let currentCell = '';
        let inQuotes = false;
        
        for (let i = 0; i < csvText.length; i++) {
            const char = csvText[i];
            const nextChar = csvText[i + 1];
            
            if (char === '"') {
                if (inQuotes && nextChar === '"') {
                    currentCell += '"';
                    i++; 
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (char === ',' && !inQuotes) {
                currentRow.push(currentCell);
                currentCell = '';
            } else if (char === '\n' && !inQuotes) {
                currentRow.push(currentCell);
                rows.push(currentRow);
                currentRow = [];
                currentCell = '';
            } else {
                currentCell += char;
            }
        }
        if (currentCell !== '' || csvText.endsWith(',')) currentRow.push(currentCell);
        if (currentRow.length > 0) rows.push(currentRow);

        for(let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if(row.length < 2) continue; 
            
            const classStrRaw = row[0] ? row[0].trim() : "";
            const seatStrRaw = row[1] ? row[1].trim() : "";
            
            if (!classStrRaw || !seatStrRaw) continue;
            
            // 強制轉換為純數字避免 05 與 5 的衝突
            const classStr = parseInt(classStrRaw).toString();
            const seatStr = parseInt(seatStrRaw).toString(); 
            if (isNaN(classStr) || isNaN(seatStr)) continue;

            const key = `${classStr}_${seatStr}`;
            
            let tasks = [
                { title: "第一關：自我介紹", text: row[2] ? row[2].trim() : "" },
                { title: "第二關：英語校園導覽", text: row[3] ? row[3].trim() : "" },
                { title: "第三關：英語故事短文朗讀", text: row[4] ? row[4].trim() : "" }
            ];
            fetchedTasks[key] = tasks.filter(t => t.text.length > 0);
        }
        console.log("題庫讀取成功！");
    }

    // --- 語音與錄音設定 ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecognizing = false;
    let finalTranscript = '';
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = true; 
        recognition.interimResults = true;

        recognition.onstart = function() {
            isRecognizing = true;
            finalTranscript = '';
            updateUIForRecording(true);
        };

        recognition.onresult = function(event) {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            document.getElementById('recognized-text').innerText = finalTranscript + interimTranscript;
            document.getElementById('recognized-text').style.color = "black";
        };

        recognition.onerror = function(event) {
            alert("收音出現問題，請確認已允許麥克風權限！");
            window.stopRecordingAndRecognition();
        };

        recognition.onend = function() {
            isRecognizing = false;
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop(); 
            } else {
                processResult(); 
            }
        };
    }

    // --- 畫面切換與操作邏輯 ---
    window.loginAndFetchTask = function() {
        const classValRaw = document.getElementById('class-input').value.trim();
        const seatValRaw = document.getElementById('seat-input').value.trim();
        
        const classVal = parseInt(classValRaw).toString();
        const seatVal = parseInt(seatValRaw).toString(); 
        
        if(!classValRaw || !seatValRaw || isNaN(classVal) || isNaN(seatVal)) { 
            alert("請輸入正確的班級與座號！"); return; 
        }

        const studentKey = `${classVal}_${seatVal}`;
        const tasks = fetchedTasks[studentKey];

        if(tasks && tasks.length > 0) {
            currentStudentId = studentKey;
            currentStudentTasks = tasks;
            
            document.getElementById('welcome-student-id').innerText = `${classVal}班 ${seatVal}號`;
            window.renderLevelSelection();
            
            document.getElementById('login-section').style.display = "none";
            document.getElementById('level-section').style.display = "block";
        } else {
            alert("找不到你的關卡資料！請檢查班級或座號是否有在雲端題庫中。");
        }
    };

    window.renderLevelSelection = function() {
        const levelList = document.getElementById('level-list');
        levelList.innerHTML = "";
        
        let totalStars = 0; 

        currentStudentTasks.forEach((task, index) => {
            const btn = document.createElement('button');
            const recordKey = `${currentStudentId}_lvl_${index}`;
            const bestScore = sessionScores[recordKey];
            
            let statusHtml = "🔓 尚未挑戰";
            let btnClass = "level-btn";
            
            if (bestScore !== undefined) {
                let starStr = "";
                let starsCount = 0;
                
                if (bestScore >= 90) { starStr = "⭐⭐⭐⭐⭐"; starsCount = 5; }
                else if (bestScore >= 80) { starStr = "⭐⭐⭐⭐"; starsCount = 4; }
                else if (bestScore >= 60) { starStr = "⭐⭐⭐"; starsCount = 3; }
                else if (bestScore >= 40) { starStr = "⭐⭐"; starsCount = 2; }
                else { starStr = "⭐"; starsCount = 1; }
                
                totalStars += starsCount; 
                
                statusHtml = `${starStr} (最高 ${bestScore}%)`;
                if (bestScore >= 90) {
                    btnClass += " level-completed";
                }
            }
            
            btn.className = btnClass;
            btn.innerHTML = `${task.title} <span class="level-stats">${statusHtml}</span>`;
            btn.onclick = () => window.enterLevel(index);
            
            levelList.appendChild(btn);
        });

        if (!petData[currentStudentId]) {
            const randomEmoji = petEmojis[Math.floor(Math.random() * petEmojis.length)];
            petData[currentStudentId] = randomEmoji;
            localStorage.setItem('matsubayashi_pets', JSON.stringify(petData));
        }
        const myPet = petData[currentStudentId];

        const petTitleEl = document.getElementById('pet-title');
        const petEmojiEl = document.getElementById('pet-emoji');
        
        if (totalStars === 0) {
            petTitleEl.innerText = `🥚 神秘的寵物蛋 (${totalStars} 顆星)`;
            petEmojiEl.innerText = "🥚";
        } else if (totalStars >= 1 && totalStars <= 4) {
            petTitleEl.innerText = `🐣 剛孵化的小動物 (${totalStars} 顆星)`;
            petEmojiEl.innerText = "🐣";
        } else if (totalStars >= 5 && totalStars <= 9) {
            petTitleEl.innerText = `✨ 快樂的寵物夥伴 (${totalStars} 顆星)`;
            petEmojiEl.innerText = myPet;
        } else if (totalStars >= 10 && totalStars <= 14) {
            petTitleEl.innerText = `🎓 學霸寵物 (${totalStars} 顆星)`;
            petEmojiEl.innerText = `🎓${myPet}`;
        } else if (totalStars >= 15) {
            petTitleEl.innerText = `👑 傳說中的國王寵物 (${totalStars} 顆星)`;
            petEmojiEl.innerText = `👑${myPet}`;
        }
    }

    window.enterLevel = function(index) {
        currentLevelIndex = index;
        const task = currentStudentTasks[index];
        
        document.getElementById('level-section').style.display = "none";
        document.getElementById('read-section').style.display = "block";
        
        document.getElementById('student-identity').innerText = currentStudentId.replace('_', '班') + '號';
        document.getElementById('task-title').innerText = task.title;
        document.getElementById('script-display').innerHTML = task.text;
        
        resetResultUI();
    };

    window.backToLevelSelection = function() {
        if(isRecognizing) window.stopRecordingAndRecognition();
        document.getElementById('read-section').style.display = "none";
        document.getElementById('level-section').style.display = "block";
        window.renderLevelSelection(); 
    };

    window.backToLogin = function() {
        if(isRecognizing) window.stopRecordingAndRecognition();
        document.getElementById('read-section').style.display = "none"; 
        document.getElementById('level-section').style.display = "none";
        document.getElementById('login-section').style.display = "block";
        document.getElementById('class-input').value = "";
        document.getElementById('seat-input').value = "";
    };

    // --- 錄音與結算 ---
    window.playAudio = function() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(currentStudentTasks[currentLevelIndex].text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        } else {
            alert("你的瀏覽器不支援語音朗讀功能喔！");
        }
    };

    window.startRecordingAndRecognition = async function() {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel(); 
        resetResultUI();
        audioChunks = [];
        audioBlob = null;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                stream.getTracks().forEach(track => track.stop());
                if(!isRecognizing) processResult();
            };

            mediaRecorder.start();
            
            if (recognition) {
                recognition.start();
            } else {
                alert("瀏覽器不支援語音辨識。");
            }
        } catch (err) {
            console.error("麥克風權限被拒絕", err);
            alert("請允許網頁使用麥克風才能開始練習喔！");
        }
    };

    window.stopRecordingAndRecognition = function() {
        updateUIForRecording(false);
        if (recognition && isRecognizing) recognition.stop(); 
        if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
    };

    function updateUIForRecording(isRecording) {
        document.getElementById('start-btn').style.display = isRecording ? "none" : "inline-block";
        document.getElementById('stop-btn').style.display = isRecording ? "inline-block" : "none";
        if(isRecording) {
            document.getElementById('recognized-text').innerText = "聆聽中...";
            document.getElementById('script-display').innerHTML = currentStudentTasks[currentLevelIndex].text; 
        } else {
            document.getElementById('start-btn').innerText = "🎤 重新挑戰";
        }
    }

    function resetResultUI() {
        document.getElementById('result-box').style.display = "none";
        document.getElementById('stars-display').innerText = "";
        document.getElementById('combo-display').style.display = "none";
        document.getElementById('score-text').innerText = "0";
        document.getElementById('upload-status').style.display = "none";
    }

    async function processResult() {
        if(!finalTranscript.trim()) return;
        document.getElementById('result-box').style.display = "block";

        const currentTaskText = currentStudentTasks[currentLevelIndex].text;
        const targetWords = currentTaskText.split(/[\s\n]+/);
        const spokenClean = finalTranscript.toLowerCase();
        
        let htmlOutput = "";
        let matchCount = 0;
        let validWordCount = 0;
        let currentCombo = 0;
        let maxCombo = 0;

        targetWords.forEach(word => {
            if(!word) return; 
            validWordCount++;
            let cleanWord = word.replace(/[.,!?;:]/g, "").toLowerCase();
            
            if (cleanWord && spokenClean.includes(cleanWord)) {
                htmlOutput += `<span style="color: #32CD32; font-weight: bold;">${word}</span> `;
                matchCount++;
                currentCombo++;
                if (currentCombo > maxCombo) maxCombo = currentCombo; 
            } else {
                htmlOutput += `<span style="color: #FF6347; text-decoration: underline; text-decoration-color: #FFD700;">${word}</span> `;
                currentCombo = 0; 
            }
        });

        document.getElementById('script-display').innerHTML = htmlOutput;

        let score = Math.round((matchCount / validWordCount) * 100);
        if(score > 100) score = 100;
        document.getElementById('score-text').innerText = score;
        
        const comboEl = document.getElementById('combo-display');
        if (maxCombo >= 5) {
            comboEl.innerText = `🔥 狂飆 ${maxCombo} Combo 連擊！`;
            comboEl.style.display = "block";
        } else {
            comboEl.style.display = "none";
        }

        let starStr = "";
        if (score >= 90) starStr = "⭐⭐⭐⭐⭐";
        else if (score >= 80) starStr = "⭐⭐⭐⭐";
        else if (score >= 60) starStr = "⭐⭐⭐";
        else if (score >= 40) starStr = "⭐⭐";
        else starStr = "⭐";

        document.getElementById('stars-display').innerText = starStr;

        const recordKey = `${currentStudentId}_lvl_${currentLevelIndex}`;
        const previousBest = sessionScores[recordKey] || 0;

        // 🌟 分數破紀錄時：更新本地並發送給 Google Sheet
        if (score > previousBest) {
            sessionScores[recordKey] = score;
            localStorage.setItem('matsubayashi_scores', JSON.stringify(sessionScores));
            
            updateScoreToGoogleSheet(currentStudentId, currentLevelIndex, score);
        }

        if (score >= 90 && audioBlob) {
            uploadAudioToGoogleDrive(audioBlob, score, currentStudentTasks[currentLevelIndex].title);
        }
    }

    // 🚀 優化 3：使用 no-cors 模式，解決跨域阻擋導致無法寫入試算表的問題
    function updateScoreToGoogleSheet(studentId, levelIndex, score) {
        if (!GAS_URL) return;

        const payload = {
            action: "update_score",
            student_id: studentId,
            level_index: levelIndex,
            score: score
        };

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // 忽略跨域警告，強制背景送出
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' // 使用 plain text 確保 GAS 接收
            },
            body: JSON.stringify(payload)
        }).then(() => {
            console.log("分數寫入請求已傳送至背景");
        }).catch(error => console.error("分數寫入請求發送失敗:", error));
    }

    // 🚀 上傳音檔功能 (同樣加上 no-cors 保護傳輸)
    function uploadAudioToGoogleDrive(blob, score, levelTitle) {
        if (!GAS_URL) return;

        const reader = new FileReader();
        reader.readAsDataURL(blob); 
        reader.onloadend = async function() {
            const base64Audio = reader.result.split(',')[1]; 
            const statusEl = document.getElementById('upload-status');
            
            statusEl.innerText = "⏳ 正在將音檔傳送到老師的雲端硬碟...";
            statusEl.style.color = "#FF8C00";
            statusEl.style.display = "block";

            const payload = {
                action: "upload_audio", 
                student_id: currentStudentId,
                level_title: levelTitle,
                score: score,
                mime_type: blob.type,
                audio_base64: base64Audio
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 忽略跨域警告
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });
                // 因為 no-cors 無法讀取回傳值，只要沒報錯就當作成功
                statusEl.innerText = "🔊 完美達成！已將這關的聲音上傳給老師！";
                statusEl.style.color = "#C71585";
            } catch (error) {
                console.error("上傳音檔失敗:", error);
                statusEl.innerText = "❌ 哎呀，上傳雲端失敗了，請檢查網路連線。";
                statusEl.style.color = "red";
            }
        }
    }
</script>
